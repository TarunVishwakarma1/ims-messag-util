{{define "styles"}}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  
  :root {
    --primary: #4F46E5;
    --primary-hover: #4338CA;
    --background: #F3F4F6;
    --card-bg: #FFFFFF;
    --text-main: #111827;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --danger: #EF4444;
    --success: #10B981;
    --warning: #F59E0B;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: #F3F4F6;
    color: #111827;
    -webkit-font-smoothing: antialiased;
  }

  /* Structural Classes */
  .wrapper {
    width: 100%;
    table-layout: fixed;
    background-color: #F3F4F6;
    padding: 40px 0;
  }
  
  .main-container {
    max-width: 600px;
    margin: 0 auto;
    background-color: #FFFFFF;
    border-radius: 16px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    overflow: hidden;
  }

  /* Header */
  .header {
    background-color: #4F46E5;
    padding: 32px 40px;
    text-align: center;
    color: #ffffff;
  }
  
  .header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.025em;
  }

  /* Content */
  .content {
    padding: 40px;
    line-height: 1.6;
    color: #111827;
  }
  
  .content h2 {
    font-size: 20px;
    margin-top: 0;
    margin-bottom: 16px;
    color: #111827;
  }
  
  .content p {
    margin-top: 0;
    margin-bottom: 24px;
    color: #6B7280;
  }

  /* Footer */
  .footer {
    background-color: #F9FAFB;
    border-top: 1px solid #E5E7EB;
    padding: 32px 40px;
    text-align: center;
    color: #6B7280;
    font-size: 14px;
  }

  .footer a {
    color: #4F46E5;
    text-decoration: none;
  }

  /* Utility Components */
  .btn {
    display: inline-block;
    background-color: #4F46E5;
    color: #ffffff !important;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 500;
    text-align: center;
    transition: background-color 0.2s;
  }

  /* OTP Specific */
  .otp-box {
    background-color: #F3F4F6;
    border: 1px dashed #4F46E5;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin: 32px 0;
  }
  
  .otp-text {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #4F46E5 !important;
    margin: 0;
  }

  /* Alert Specific */
  .alert-box {
    border-left: 4px solid #F59E0B;
    background-color: #FEF3C7;
    padding: 16px 20px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 24px;
  }
  .alert-box.danger {
    border-left-color: #EF4444;
    background-color: #FEE2E2;
  }
  .alert-text {
    margin: 0 !important;
    color: #92400E !important;
    font-weight: 500;
  }
  .alert-text.danger {
    color: #991B1B !important;
  }
  
  /* Media Queries */
  @media screen and (max-width: 600px) {
    .main-container {
      margin: 0 20px;
      width: auto !important;
    }
    .content, .header, .footer {
      padding: 24px;
    }
  }
</style>
{{end}}
