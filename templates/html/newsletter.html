{{define "content"}}
  <h2>{{.Data.Title}}</h2>
  <p>{{.Data.IntroText}}</p>
  
  {{range .Data.Articles}}
  <div style="margin-top: 24px; padding-bottom: 24px; border-bottom: 1px solid #E5E7EB;">
    <h3 style="margin-bottom: 8px; color: #4F46E5;">{{.Headline}}</h3>
    <p style="margin-top: 0; margin-bottom: 12px;">{{.Summary}}</p>
    <a href="{{.ReadMoreURL}}" style="color: #4F46E5; font-weight: 500; text-decoration: none;">Read more &rarr;</a>
  </div>
  {{end}}
  
  <div style="margin-top: 32px; padding: 20px; background-color: #F3F4F6; border-radius: 8px; text-align: center;">
    <p style="margin: 0; font-weight: 500;">Stay tuned for more updates next month!</p>
  </div>
{{end}}
