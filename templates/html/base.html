{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Subject}}</title>
  {{template "styles" .}}
</head>
<body>
  <div class="wrapper">
    <!-- Card Container -->
    <div class="main-container">
      {{template "header" .}}
      
      <div class="content">
        {{template "content" .}}
      </div>
    </div>
    
    <!-- Footer resides seamlessly below the card -->
    {{template "footer" .}}
  </div>
</body>
</html>
{{end}}
