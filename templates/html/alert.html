{{define "content"}}
  <h2>Action Required</h2>
  
  <div class="alert-box {{if eq .Data.Severity "high"}}danger{{end}}">
    <p class="alert-text {{if eq .Data.Severity "high"}}danger{{end}}">{{.Data.AlertMessage}}</p>
  </div>
  
  <p>{{.Data.Details}}</p>
  
  {{if .Data.ActionURL}}
  <div style="text-align: center; margin-top: 32px;">
    <a href="{{.Data.ActionURL}}" class="btn">{{.Data.ActionText}}</a>
  </div>
  {{end}}
  
  <p style="margin-top: 32px;">Thanks,<br>The IMS System</p>
{{end}}
